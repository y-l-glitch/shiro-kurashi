く出来上がった。 今月もまた"},{"start":199.8,"text":"この日がやってきた。 本日限定！ショッピング三昧デー！すべて無料です。"},{"start":234.4,"text":"洗濯機が壊れてしまったので、今はコインランドリー生活を送っています。"},{"start":246.7,"text":"私はアンドリーに荷物を預け、買い物をするために2往復した。"},{"start":260.8,"text":"これらは全てポイントを使って購入しました。"},{"start":275.0,"text":"でも、一番重要な洗濯機を買うという決断がどうしてもできないんです。 それでは、"},{"start":286.7,"text":"今月の戦利品を整理しよう。普段は買わないお菓子類は、この日だけ仕入れる。"},{"start":354.1,"text":"私はこれらの点を大切にし、その価値を十分に理解します。"},{"start":374.4,"text":"チョコレートは溶けるので、冷蔵庫で保管してください。便利なハーフサイズのバスタオル。"},{"start":417.4,"text":"店の奥にバナナが1本だけ残っていたので、それを買いました。"},{"start":428.6,"text":"熟しているけれど、アイスクリームとの相性は抜群だ。"},{"start":440.9,"text":"バナナの甘みを利用すれば、砂糖を使わずにアイスクリームを作れそうですね。"},{"start":456.2,"text":"冷凍保存可能。ついでに夕食の準備もしておきましょう。しらたき麺は、"},{"start":488.8,"text":"熱湯に浸して臭みを取り除いてください。ジャガイモとニンジンを大きめに切る。"},{"start":517.7,"text":"豚肉の細切り。「セットして放っておくだけ」のレシピ。材料を炊飯器に入れるだけです。"},{"start":535.6,"text":"冷凍玉ねぎ、水、和風だし汁、醤油、砂糖、料理酒、みりん。"},{"start":555.1,"text":"豚肉を細かく裂いて、炊飯器のスイッチを入れるだけです。その間に風呂に入ると、"},{"start":579.1,"text":"ほうれん草は長時間煮込んだような味がする。肉じゃが（肉とじゃがいもの煮込み）、"},{"start":603.7,"text":"オクラスープ、キムチとほうれん草を添えた豆腐、ゴマソースで和えたもの、"},{"start":616.3,"text":"野菜たっぷりの日本料理。炊飯器を使うと、鍋で煮込むよりも簡単で美味しく仕上がります。"},{"start":655.5,"text":"昨日終わらなかったストック作業の続きです。バターを切って冷凍しておくと便利です。"},{"start":686.7,"text":"ラップの端を折り返し、その上にバターを置きます。ラップでしっかりと包んでください。"},{"start":705.9,"text":"これにより、必要な量だけを簡単に取り出すことができます。"},{"start":717.3,"text":"大量のスライスパンを使って、創造力を発揮しましょう。溶かしバター、小麦粉。"},{"start":746.5,"text":"豆乳を加えて混ぜ、電子レンジで加熱する。"},{"start":755.0,"text":"これを2、3回繰り返せば、簡単にホワイトソースが作れます。"},{"start":797.1,"text":"前回、私流のアレンジを加えて作ったフレンチトーストがとても美味しかったので、パンを1袋半も買ってしまいました。"},{"start":821.5,"text":"卵、砂糖、豆乳 卵液を注ぎ入れ、染み込ませます。マヨネーズ、ホワイトソース"},{"start":885.3,"text":"玉ねぎ、エビ、ツナ、コーン、またはお好みのその他の具材をトッピングします。"},{"start":919.9,"text":"ケチャップベースで、玉ねぎ、トマト、ピーマン、エビが入っている。"},{"start":953.4,"text":"最後の一つは、いつもの通りです。チョコレートチップ、砂糖、"},{"start":961.4,"text":"チョコレートチップメロンパン。全部で6種類あります。冷凍庫で保存してください。"},{"start":1004.7,"text":"きのこのソテーを作っています。"},{"start":1024.6,"text":"ニンニクごまドレッシング、めんつゆ（麺のスープの素）、塩コショウ。"},{"sta ,{"start":265.7,"text":"熟していたら、小さく刻んでください。 冷凍保存袋に入れて冷凍してください。"},{"start":278.1,"text":"無料でもらったチャイブから、傷んでいる部分を取り除いてください。切って冷凍する。"},{"start":305.9,"text":"新しい玉ねぎをたくさん手に入れました。普通の玉ねぎほど日持ちしません。"},{"start":317.7,"text":"新聞紙で包んでから紙袋に入れます。野菜室では、薄くスライスして冷凍してみます。ナスは"},{"start":343.1,"text":"新聞紙で包み、野菜室に入れる。小松菜は湿らせた紙に包んで保管してください。"},{"start":362.7,"text":"キャベツ全体から芯を取り除く。野菜室に湿らせたペーパータオルを詰める。"},{"start":379.2,"text":"塩水で約1分間茹でる。水分を拭き取ってから切る。冷めたら、ラップでしっかりと包む。"},{"start":407.5,"text":"冷凍の揚げ豆腐をざるに入れます。その部分に熱湯をかけると、余分な油が取り除かれます。"},{"start":428.7,"text":"細切りにして冷凍する。"},{"start":434.3,"text":"煮込み料理に使う場合は、少し多めの量を使用してください。 エノキダケは、"},{"start":441.3,"text":"混ぜご飯や味噌汁に使われるため、節約に欠かせません。"},{"start":457.5,"text":"ブロッコリーを小房に分けると…日持ちが良くなります。カボチャから種を取り除く。"},{"start":483.4,"text":"一口大に切り分け、600Wの電子レンジで4分間加熱する。"},{"start":491.1,"text":"薄切りにしたものは天ぷらに使われる。冷凍保存するナスは一口サイズに切る。"},{"start":509.0,"text":"油を塗った後、火をつけて揚げる。調理済みのカボチャから水を切ります。潰して冷凍する。"},{"start":534.4,"text":"冷めたら、使う分だけラップで包む。サラダ、スープ、デザートを作るには、"},{"start":551.8,"text":"ナスが冷めたら袋に入れて冷凍します。大根はすぐに切り取ってください。"},{"start":568.4,"text":"丸ごとなら、新聞紙で包んでください。 せっかくなので、冷凍も試してみましょう。"},{"start":581.8,"text":"すりおろして余分な水分を切る。冷凍のまま、"},{"start":594.9,"text":"味噌汁や煮込み料理など、用途に合わせてカットしてください。"},{"start":613.3,"text":"切断面はラップでしっかりと密閉してください。野菜室で大根の葉を細かく刻んで炒める。"},{"start":635.9,"text":"和風スープ、麺スープベース、ごま、かつお節、ご飯によく合うご飯用調味料、そして"},{"start":651.4,"text":"最後に肉。今回は手羽先がお得でした。鶏むね肉は間違いなく節約に最適な食材です。"},{"start":681.1,"text":"私はいつも一度に半分の枚数を使います。小分けにして冷凍保存しておくと便利です。"},{"start":706.7,"text":"冷蔵庫をきれいに整理整頓トマトが潰れないように、大根おろし、新玉ねぎ、ニラ、"},{"start":720.8,"text":"揚げ豆腐、トマト、小松菜、かぼちゃ、ナス、バナナ、なめこを使って、"},{"start":741.2,"text":"手早く簡単に調理できる便利な冷凍ストックを作りました！"},{"start":752.0,"text":"朝、窓辺で育てたエンドウ豆の芽を収穫し、オムレツに混ぜる。"},{"start":781.6,"text":"少量の野菜でも節約に役立ちます。"},{"start":793.9,"text":"残ったカボチャサラダを使ってチーズベイクを作りました。新しい玉ねぎはすぐに使います。"},{"start":813.2,"text":"鶏むね肉をハチミツ、マスタード、醤油で炒め、仕上げにブロッコリーを加える。"},{"start":836.5,"text":"あのトマト、美味しそう！ハニーマスタードチキンに梅干しをトッピングすれば完成！"},{"start":866.6,"text":"忙しい朝でも、冷凍大根は手軽に使えます。 あっという間に火が通ります。"},{"start":881.2,"text":"揚げ豆腐も少し加えてみてください。焼き鮭と卵。こんなに"},{"start":918.4,"text":"シンプルなものが朝食には最適だ。夕食には鶏の手羽元を使います。"},{"start":937.0,"text":"骨に沿って2、3箇所切り込みを入れます。フライドチキンを作る。"},{"start":955.1,"text":"牛乳を加えるとカリカリになる。 私は黒胡椒をたっぷりかけて食べるのが好きです。"},{"start":968.6,"text":"浸しておきます。かぼちゃと新玉ねぎを使った料理。600W4分。"},{"start":989.4,"text":"バターと塩漬け昆布のみ。材料の自然な甘みをお楽しみください。"},{"start":1001.6,"text":"もう一つ、電子レンジで簡単に作れる料理があります。片栗粉をたっぷりまぶして揚げると、"},{"start":1038.0,"text":"いい感じに焼き色がつきます。千切りキャベツを添えてお召し上がりください。"},{"start":1055.1,"text":"バターの甘さと塩味が絶妙にマッチしている！ 揚げたてのフライドチキン。"},{"start":1069.4,"text":"サクサクとした食感はたまりません。安価な鶏もも肉を使った、満足感のある副菜！"},{"start":1083.1,"text":"今日の昼食は残り物で作りました。フライドチキンに大根のふりかけをかけたら出来上がり。"},{"start":1117.8,"text":"実は、新しい玉ねぎを買ったのはこれが初めてかもしれない。"},{"start":1123.9,"text":"食品をより長期間保存するようになってから、"},{"start":1129.8,"text":"使う野菜の種類や作れる料理のレパートリーが増えました。"},{"start":1137.3,"text":"今日はたくさんの野菜を使おうと思います。炊飯器でポトフを作るには、"},{"start":1149.2,"text":"水、コンソメ、塩、コショウを加えてスイッチを押すだけです。"},{"start":1160.7,"text":"昨日のカボチャをサラダに使いました。メインディッシュはパスタです。"},{"start":1183.9,"text":"沸騰させるのは電子レンジに任せます。玉ねぎとベーコンを炒める。"},{"start":1196.2,"text":"冷凍トマトはお好みの大きさに砕いてください。"},{"start":1202.7,"text":"調理時間が短く、コクと風味を引き立てます。コンソメ、塩、コショウを"},{"start":1215.0,"text":"加え、揚げナスを加えてソースをパスタと混ぜ合わせれば出来上がりです。"},{"start":1230.8,"text":"ポトフも美味しいですよ。ベーコンとナスのトマトパスタ、ポトフ、カボチャのサラダ。"},{"start":1244.0,"text":"冷凍トマトは簡単に崩れるので、ソース作りに最適です！ 一口"},{"start":1251.9,"text":"食べた瞬間に口の中でとろけるポトフ。冷凍トマトを使ったパスタが美味しかった。玉ねぎ"},{"start":1271.6,"text":"残ったフライドチキンを細かく裂く。オムライスを作ろう。"},{"start":1285.4,"text":"フライドチキンをチキンライスにアレンジする。冷凍ピーマンも加えた。"},{"start":1303.1,"text":"ポトフがたくさん余ったので、まずマカロニを茹でます。豆乳でホワイトソースを作り、そこ"},{"start":1327.8,"text":"にポトフを加える。マカロニグラタンチーズのバリエーション。"},{"start":1353.3,"text":"パン粉を振りかけてグリルします。サラダには新鮮な小松菜を使ってください。"},{"start":1376.2,"text":"トマトとナッツをトッピングする。ポトフグラタン、小松菜とトマトナッツサラダ。"},{"start":1392.6,"text":"野菜たっぷりで風味豊かな美味しい一品です。"},{"start":1402.0,"text":"まとめ買いをすれば、いろいろなものを作ることができて楽しいですよ！"},{"start":1413.9,"text":"私はすっかりアイスクリーム作りにハマってしまった。きな粉と冷凍バナナを"},{"start":1424.6,"text":"ミキサーで混ぜるだけ。豆乳を少し ぱりとした味わいです。"},{"start":821.8,"text":"冷蔵庫の中の食材をかなり使い切ることができました。"},{"start":831.6,"text":"バナナきな粉ジェラートを楽しみにしていた。生クリームの代わりに豆腐を使ってください。"},{"start":844.0,"text":"炒り大豆粉と黒糖シロップをトッピング。"},{"start":849.5,"text":"きな粉の芳醇な香りが豆腐の味を覆い隠し、美味しく仕上がっている。"},{"start":860.0,"text":"食べてから掃除します。✊ついに掃除の時間になりました。 まずは"},{"start":871.0,"text":"野菜室から始めましょう。"},{"start":929.4,"text":"このスターバックスの紙袋は、いつか使うかもしれないと思って長い間保管していました。"},{"start":939.3,"text":"内側に折り曲げて、主食用の野菜を収納するケースを作りました。"},{"start":959.6,"text":"食品は、きれいになった野菜室に戻します。"},{"start":967.0,"text":"小物類や使いかけの品物は一番上の棚に置くべきです。一番難しいのは冷凍庫だ。 しばらく"},{"start":983.4,"text":"使っているうちに、こんなに汚れてしまったんです。 まずは材料を揃えましょう。"},{"start":1008.8,"text":"素晴らしい山ですが、気づかないうちにかなり汚れてしまいます。食材別に分類すると、"},{"start":1031.8,"text":"冷凍サバは我が家にとって欠かせない食材です。"},{"start":1042.3,"text":"カット済みの材料には、明確にラベルが貼られています。"},{"start":1047.3,"text":"冷凍野菜は小分けにして保管しています。また、作り置きの副菜もここに保存しています。"},{"start":1065.0,"text":"保冷剤は弁当箱に欠かせないアイテムです。洗ってきれいにしてください。"},{"start":1081.2,"text":"まだ少し生活感は残っているが、ゾーン分けされているおかげで物へのアクセスは容易になっている。 お腹が空いたので"},{"start":1087.2,"text":"、休憩して食事をします。残ったミネストローネ、冷凍ハンバーグ、ガーリックパウダー。"},{"start":1102.0,"text":"ケチャップとソースを加える。電子レンジで作るパスタを使った簡単ボロネーゼ、"},{"start":1132.7,"text":"ボロネーゼ、サラダ、アイスレモンティー。いつも次から次へと材料を買ってしまう。"},{"start":1147.2,"text":"全部使い切ると本当に気持ちがいい。材料の量が大幅に減りました。掃除が簡単そう。"},{"start":1173.1,"text":"ドアポケットはひどい… 扱いにくい調味料なぜか粉まみれです。"},{"start":1354.0,"text":"私は調味料を小分けにして保管する傾向があります。"},{"start":1360.4,"text":"豆腐の容器を再利用して保存しています。冷蔵庫の掃除が終わりました！"},{"start":1384.4,"text":"気分爽快で元気が出ました。リアルな冷蔵庫についてどう思いましたか？"},{"start":1394.6,"text":"きちんと整理された冷蔵庫のおかげで、これからも節約しながら美味しい食事を楽しめるだろう。"},{"start":1402.2,"text":"最後までご視聴いただきありがとうございました。"}],"caption_lang":"ja-en"},{"video_id":"qWFoH0xwaek","title":"【時短】朝5分で完成！簡単節約弁当🍙⌇冷凍ストックで回すリアルごはん記録⌇うまくいかない日もある😇","upload_date":"2026-04-11","duration":1326,"description":"節約しつつバランスも大切に🍳♡\n忙しい日々でも楽しめる簡単ごはんや、\nひとり暮らし社会人のおうち時間を楽しむvlogをお届けしています🪿💭\n\nよかったらチャンネル登録して\n一緒にゆったり心地よい暮らしを　\n楽しんでもらえたらとっても嬉しいです🕊️🫧  　\n \n🎬 English subtitles are available!\nTo watch in your own language, p 7,"text":"野菜と味噌汁から始める濃厚な味わいがご飯にぴったり。キャベツも一緒に、"},{"start":382.2,"text":"家にある食材を使った家庭料理をとても楽しみました。💓お風呂を掃除して、"},{"start":415.8,"text":"クナイプの入浴剤をお土産にいただきました。"},{"start":421.3,"text":"ラベンダーを選んだのは、リラックスできるからです。"},{"start":431.0,"text":"水を持ってきてゆっくり浸かりましょう🛀サプリメントと水分補給今日の相棒は緑茶です"},{"start":480.8,"text":"ストレッチをしましょう体が硬すぎました来月の出費"},{"start":510.4,"text":"買いたいものがいくつかあるので、もっと詰めます。今月を締めくくりましょう。まずは"},{"start":540.1,"text":"食費から始めましょう。私は週に一度記録しているので、残りを足すだけです。"},{"start":556.3,"text":"私はオーブン料理のレシピをたくさん作ってきました。前半はかなり大変でしたが、"},{"start":567.8,"text":"定期的な家計予算を維持することでコントロールできました。✨月々の支出を計算し、"},{"start":601.7,"text":"合計金額を入力します。家計簿を見返しながら、振り返りも書いています。"},{"start":615.7,"text":"静かな夜に文章を書くのはとてもリラックスできます。🌜来月用のシートも作りましょう。"},{"start":633.7,"text":"次は、私が浪費家だった頃、食費にたくさんお金を使っていた生活費の帳簿です。"},{"start":649.8,"text":"それからそれらを分けて、残りを同じ用紙に書きます。色分けして各項目を計算します。"},{"start":678.0,"text":"お金を節約していると思っていても、"},{"start":684.4,"text":"一つずつ書き出してみると、自分がどれだけお金を使っているかに驚きます。今月は✨"},{"start":698.8,"text":"2月1日の予算をレビューできました！電気・ガス・水道予算：12,000円"},{"start":705.4,"text":"通信費予算：6,000円日用品予算：3,000円美容・衣料費予算：10,000円"},{"start":715.6,"text":"交通費：5,000円医療費予算：25,000円娯楽費予算：10,000円"},{"start":725.7,"text":"自由支出予算：17,000円結果"},{"start":731.9,"text":"電子レンジでレシピを作ったり加熱したりしたため、電気代が高くなりました。"},{"start":749.9,"text":"美容製品は買わず、季節外れのTシャツを買いました。医療処置で歯列矯正はスキップ💸"},{"start":763.1,"text":"今月は、目立つ部分と抑えられている部分がはっきりしています！"},{"start":773.8,"text":"合計金額を書き留めるだけで完了です。おやすみなさい🌜 おはようございます。"},{"start":812.3,"text":"今日はお弁当作りからスタート。いつものように、卵1個だけで卵焼きを作りました。"},{"start":830.6,"text":"一人暮らしを始めた頃は、卵焼きをうまく巻くことができなかった。"},{"start":837.1,"text":"私は成長して、毎日もっと経済的なランチを作れるようになった。"},{"start":849.8,"text":"食器洗いは面倒だから、ヘラで混ぜてしまおう。ふわふわの豆腐オムレツができました！"},{"start":931.3,"text":"副菜の色を考えてみてください。簡単に作れます。メインディッシュは昨日の生姜豚肉です。"},{"start":960.3,"text":"これをランチに食べることを想像してみてください。お弁当を作るのが楽しくなりそうです。"},{"start":977.4,"text":"サラダは残り物です。これで生姜豚肉弁当の完成です。朝食を楽しみましょう。"},{"start":995.1,"text":"たまには自分を甘やかすことも大切です。ネギを少し加えるだけで、準備完了です。"},{"start":1020.5,"text":"祖母からもらったリンゴは毎年楽しみにしています。明太子おにぎりは"},{"start":103 },{"start":925.2,"text":"焼き型、鍋つかみ、オーブンミット。上にはドライフルーツとグラノーラが乗っています。"},{"start":937.9,"text":"キッチンカートの上にランチバッグが置いてある。"},{"start":945.5,"text":"自家製スイーツを保存するためのガラス瓶、お弁当箱に使う千川古かけ調味料🐰"},{"start":957.3,"text":"炊飯器はシャープ製の3カップ容量モデルです。"},{"start":963.3,"text":"電気ケトルはティファール製の1.2Lモデルです。カトラリー類を"},{"start":974.4,"text":"本当に整理したいんです。お弁当箱の中身サプリメントと薬マグカップとグラス あまり"},{"start":1010.0,"text":"使わない食器類 おにぎりグッズ ちかうの型毎日使っているお弁当箱はここにあります。"},{"start":1037.3,"text":"一人暮らしの人のための小さなパントリー。健康活動などで購入した食品など。"},{"start":1048.2,"text":"日立のスチームオーブン電子レンジ。上には卵調理器を置いています。お盆に、"},{"start":1061.9,"text":"使いやすさを基準にキッチンタイマーを選びました。"},{"start":1069.1,"text":"冷蔵庫はアクア社製で、容量は272リットルです。その隣にはコードレス掃除機がある。"},{"start":1077.1,"text":"この場所は、必要な時にいつでも簡単に電話をかけられるので便利です。"},{"start":1083.6,"text":"ハンディワイパー、歌麿洗剤、消臭スプレー、掃除機の充電器。"},{"start":1094.4,"text":"古いタオルを切り刻んで掃除用布として使っています。クイックルワイパー"},{"start":1108.4,"text":"寝室以外の部屋にはゴミ箱を置いていません。 私たちは単にクリップを使ってゴミ袋を固定しています。"},{"start":1115.5,"text":"私たちはゴミを可燃性廃棄物と不燃性廃棄物に分別しています。キッチン用品："},{"start":1129.9,"text":"計量スプーンはすぐに手の届くところに置いておけば、いつでもレシピを準備できます。"},{"start":1147.4,"text":"キッチンツール ラップ、アルミホイル、魚焼き用ホイル 油がこぼれないよう"},{"start":1168.6,"text":"に、ここに油を置いてください。食器を洗うには手袋が不可欠です。"},{"start":1182.9,"text":"ハンドソープ、アルカリ電解水、食器用洗剤、キッチンタオルとハンドタオル、"},{"start":1195.1,"text":"まな板2枚、油はね防止用コンロガード、トング、調理用スプーン、ヘラ、"},{"start":1211.7,"text":"パリのお土産に買った小さなトレイ、"},{"start":1217.3,"text":"セイロは強力なマグネットフックとして販売されています。"},{"start":1223.3,"text":"日常的に使うだし汁や調味料を収納するために、この棚も設置しました。"},{"start":1235.6,"text":"アルカリ電解水で拭いています。キッチンペーパー、サラダスピナー、タンブラー。"},{"start":1252.0,"text":"この部分もアルカリ電解水で拭きます。フライパン、鍋、ボウル、調味料。"},{"start":1276.5,"text":"引き出しにはスパイスが入っています。"},{"start":1290.3,"text":"私は料理が好きなので、ついつい食器や調理器具をたくさん集めてしまいます。"},{"start":1296.7,"text":"日常使いの茶碗やスープボウル、昼食の準備、残り物の保存、食材の保管に使うタッパー。"},{"start":1316.2,"text":"空のジャム瓶を再利用して油や粘り気のある大麦を保存したり、計量スケールや計量カップ、"},{"start":1335.0,"text":"スープ、スナック、乾燥食品などを保存したりします。一番上には製菓材料があります。"},{"start":1346.7,"text":"これで部屋の見学は終了です。私たちは、快適で心地よい住まいづくりに注力していきます。"},{"start":1357.9,"text":"ご質問やご意見がございましたら、コメント <script>
"use strict";
const videos = DATA.videos;
const PAGE = 60;          // 一度に描画する件数
const MAX_EXCERPTS = 6;   // 1動画あたりの抜粋表示数
const CTX = 22;           // 抜粋の前後文字数

// カタカナ→ひらがな、全角英数→半角、英大文字→小文字 (すべて1文字→1文字の変換で
// 元テキストと文字位置が一致するようにしている)
function fold(s) {
  return s
    .replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))
    .replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
    .replace(/[A-Z]/g, c => c.toLowerCase())
    .replace(/　/g, " ");
}

// 前処理: 字幕全文を連結し、文字位置→再生時刻の対応表を作る
for (const v of videos) {
  let joined = "";
  const offs = [];
  for (const s of v.segments) { offs.push([joined.length, s.start]); joined += s.text; }
  v._joined = joined;
  v._offs = offs;
  v._njoined = fold(joined);
  v._ntitle = fold(v.title);
  v._ndesc = fold(v.description || "");
}

function timeAt(v, pos) {
  const offs = v._offs;
  let lo = 0, hi = offs.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (offs[mid][0] <= pos) lo = mid; else hi = mid - 1;
  }
  return offs.length ? offs[lo][1] : 0;
}

function fmtTime(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600), m = Math.floor(sec % 3600 / 60), s = sec % 60;
  const mm = String(m).padStart(2, "0"), ss = String(s).padStart(2, "0");
  return h ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function findIntervals(ntext, terms) {
  const iv = [];
  for (const t of terms) {
    let i = 0;
    while ((i = ntext.indexOf(t, i)) !== -1 && iv.length < 60) { iv.push([i, i + t.length]); i += t.length; }
  }
  iv.sort((a, b) => a[0] - b[0]);
  const merged = [];
  for (const [s, e] of iv) {
    if (merged.length && s <= merged[merged.length - 1][1]) {
      merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], e);
    } else merged.push([s, e]);
  }
  return merged;
}

// terms にマッチする部分を <mark> で強調した DOM 断片を返す
function markup(text, terms) {
  const frag = document.createDocumentFragment();
  if (!terms.length) { frag.appendChild(document.createTextNode(text)); return frag; }
  let last = 0;
  for (const [s, e] of findIntervals(fold(text), terms)) {
    if (s > last) frag.appendChild(document.createTextNode(text.slice(last, s)));
    frag.appendChild(el("mark", null, text.slice(s, e)));
    last = e;
  }
  frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

function searchVideo(v, terms) {
  for (const t of terms) {
    if (!v._ntitle.includes(t) && !v._ndesc.includes(t) && !v._njoined.includes(t)) return null;
  }
  const titleHit = terms.some(t => v._ntitle.includes(t));
  // 字幕内のヒット位置を収集
  const positions = [];
  for (const t of terms) {
    let i = 0, c = 0;
    while ((i = v._njoined.indexOf(t, i)) !== -1 && c < 15) { positions.push([i, t.length]); i += t.length; c++; }
  }
  positions.sort((a, b) => a[0] - b[0]);
  const excerpts = [];
  let total = 0, lastPos = -1e9;
  for (const [p, len] of positions) {
    if (p - lastPos < CTX) continue; // 近接ヒットはまとめる
    lastPos = p;
    total++;
    if (excerpts.length < MAX_EXCERPTS) {
      const s = Math.max(0, p - CTX), e = Math.min(v._joined.length, p + len + CTX + 4);
      excerpts.push({ time: timeAt(v, p), text: v._joined.slice(s, e) });
    }
  }
  // 説明欄のヒット抜粋(最初の1箇所)
  let descEx = null;
  for (const t of terms) {
    const i = v._ndesc.indexOf(t);
    if (i !== -1) {
      const s = Math.max(0, i - CTX), e = Math.min(v.description.length, i + t.length + CTX + 4);
      descEx = v.description.slice(s, e).replace(/\s+/g, " ");
      break;
    }
  }
  return { v, titleHit, excerpts, total, descEx };
}

function card(res, terms) {
  const v = res.v;
  const url = `https://youtu.be/${v.video_id}`;
  const c = el("article", "card");

  const a = el("a", "thumb");
  a.href = url; a.target = "_blank"; a.rel = "noopener";
  const img = el("img");
  img.loading = "lazy";
  img.src = `https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg`;
  img.alt = "";
  a.appendChild(img);
  if (v.duration) a.appendChild(el("span", "dur", fmtTime(v.duration)));

  const info = el("div", "info");
  const ta = el("a", "title");
  ta.href = url; ta.target = "_blank"; ta.rel = "noopener";
  ta.appendChild(markup(v.title, terms));
  const dateStr = v.upload_date ? v.upload_date.replaceAll("-", "/") : "";
  info.appendChild(ta);
  const notes = (v.no_captions ? " ・字幕なし" : "") +
    (v.caption_lang === "ja-en" ? " ・字幕は自動翻訳" : "");
  info.appendChild(el("div", "meta", dateStr + notes));
  c.appendChild(a);
  c.appendChild(info);

  if (terms.length && (res.excerpts.length || res.descEx)) {
    const hits = el("div", "hits");
    if (res.descEx) {
      const d = el("div", "hit");
      d.appendChild(el("span", "label", "説明欄"));
      d.appendChild(markup(res.descEx, terms));
      hits.appendChild(d);
    }
    for (const ex of res.excerpts) {
      const h = el("a", "hit");
      h.href = `${url}?t=${Math.max(0, Math.floor(ex.time) - 2)}`;
      h.target = "_blank"; h.rel = "noopener";
      h.appendChild(el("span", "time", "▶ " + fmtTime(ex.time)));
      h.appendChild(markup(ex.text, terms));
      hits.appendChild(h);
    }
    if (res.total > res.excerpts.length) {
      hits.appendChild(el("div", "morehits", `ほか ${res.total - res.excerpts.length} 箇所でヒット`));
    }
    c.appendChild(hits);
  }
  return c;
}

const $q = document.getElementById("q");
const $results = document.getElementById("results");
const $stat = document.getElementById("stat");
const $more = document.getElementById("more");
const $empty = document.getElementById("empty");

let pending = [], pendingTerms = [], shown = 0;

function renderMore() {
  const slice = pending.slice(shown, shown + PAGE);
  const frag = document.createDocumentFragment();
  for (const res of slice) frag.appendChild(card(res, pendingTerms));
  $results.appendChild(frag);
  shown += slice.length;
  const rest = pending.length - shown;
  $more.hidden = rest <= 0;
  if (rest > 0) $more.textContent = `さらに表示 (残り ${rest} 本)`;
}

function run() {
  const terms = fold($q.value.trim()).split(/\s+/).filter(Boolean);
  let items;
  if (!terms.length) {
    items = videos.map(v => ({ v, titleHit: false, excerpts: [], total: 0, descEx: null }));
    $stat.textContent = `全 ${videos.length} 本`;
  } else {
    items = [];
    for (const v of videos) {
      const r = searchVideo(v, terms);
      if (r) items.push(r);
    }
    // タイトルヒットを先頭に、それ以外は新しい順(元の並びが新しい順)
    items.sort((a, b) => (b.titleHit - a.titleHit));
    $stat.textContent = `${items.length} 本ヒット / 全 ${videos.length} 本`;
  }
  pending = items; pendingTerms = terms; shown = 0;
  $results.textContent = "";
  $empty.hidden = items.length > 0;
  renderMore();
}

let timer = null;
$q.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(run, 150); });
$q.addEventListener("search", run);
$more.addEventListener("click", renderMore);

document.getElementById("foot").textContent =
  `データ更新日 ${DATA.updated} ・ ${videos.length} 本収録`;
run();
</script>
</body>
</html>
